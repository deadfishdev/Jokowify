<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thumbnail Animator</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 280px;
        font-family: Arial, Helvetica, sans-serif;
        background: #ffffff;
        color: #111111;
      }

      .panel {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
      }

      input,
      button {
        font: inherit;
      }

      input[type="number"] {
        padding: 8px 10px;
        border: 1px solid #cfcfcf;
      }

      button {
        padding: 9px 10px;
        border: 1px solid #111111;
        background: #111111;
        color: #ffffff;
        cursor: pointer;
      }

      .note {
        font-size: 12px;
        line-height: 1.4;
        color: #555555;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <label>
        Particle budget
        <input id="budget" type="number" min="1000" max="16000" step="500" />
      </label>
      <label>
        Target image
        <input id="targetImage" type="file" accept="image/*" />
      </label>
      <img id="preview" alt="Target preview" style="display:none;width:100%;border:1px solid #cfcfcf;" />
      <button id="save" type="button">Save</button>
      <div class="note">
        Upload one target image. Each YouTube thumbnail will animate into that image inside the thumbnail frame.
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
